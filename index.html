<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>INBOX ZERO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; touch-action: none; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 390, H = 693;
const DESTROY_ZONE_Y = H * 0.20; // cards only destroyable below this line
const BULLET_MAX_Y   = H * 0.22; // bullets disappear above this line

let scale = 1;
function resize() {
  // Use devicePixelRatio for crisp rendering on retina/mobile
  const dpr = window.devicePixelRatio || 1;
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / W, wh / H);
  canvas.width  = Math.round(W  * scale * dpr);
  canvas.height = Math.round(H  * scale * dpr);
  canvas.style.width  = Math.round(W * scale) + 'px';
  canvas.style.height = Math.round(H * scale) + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(scale * dpr, scale * dpr);
}
resize();
window.addEventListener('resize', resize);

// ---- CARD DIMENSIONS ----
const CARD_W    = 118;
const CARD_PAD  = 9;
const CARD_TOP  = 21;
const CARD_BODY = 50;
const CARD_H    = CARD_TOP + CARD_BODY; // 71

// ---- AUDIO ----
let audioCtx;
let musicPlaying = false;
let musicTimeout = null;

function au() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function beep(freq, type, dur, vol = 0.1) {
  try {
    const c = au(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}

function playShoot()   { beep(880,'square',0.04,0.05); }
function playBoom()    { beep(110,'sawtooth',0.15,0.17); }
function playPowerup() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.12,0.14),i*70)); }
function playDeath()   { stopMusic(); beep(180,'sawtooth',0.7,0.28); }

function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  const BPM = 138, beat = 60 / BPM;

  const melody = [
    [659,.5],[659,.5],[0,.5],[659,.5],[0,.5],[523,.5],[659,.5],[0,.5],
    [784,1],[0,1],[392,1],[0,1],
    [523,.5],[0,1],[392,.5],[0,1],[330,.5],[0,.75],[220,.5],[0,.5],
    [247,.5],[0,.5],[262,.5],[0,.5],[247,.5],[0,.5],[220,.75],
    [659,.5],[0,.25],[784,.5],[0,.25],[831,.5],[0,.25],[784,.75],
    [659,.75],[523,.5],[587,.5],[494,.75],[0,.5],
    [523,.5],[0,1],[392,.5],[0,1],[330,.5],[0,.5],
  ];
  const bass = [
    [130,2],[165,2],[196,2],[175,2],
    [130,2],[165,2],[196,2],[175,2],
  ];

  const totalBeats = melody.reduce((s,[,d])=>s+d, 0);

  function playLoop() {
    if (!musicPlaying) return;
    const c = au();
    let t = c.currentTime + 0.02;

    melody.forEach(([freq, dur]) => {
      if (freq > 0) {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'square'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.055, t);
        g.gain.setValueAtTime(0.055, t + dur*beat*0.7);
        g.gain.linearRampToValueAtTime(0, t + dur*beat*0.95);
        o.start(t); o.stop(t + dur*beat);
      }
      t += dur * beat;
    });

    let bt = c.currentTime + 0.02;
    bass.forEach(([freq, dur]) => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'triangle'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.045, bt);
      g.gain.linearRampToValueAtTime(0, bt + dur*beat*0.8);
      o.start(bt); o.stop(bt + dur*beat);
      bt += dur * beat;
    });

    musicTimeout = setTimeout(playLoop, totalBeats * beat * 970);
  }
  playLoop();
}

function stopMusic() {
  musicPlaying = false;
  if (musicTimeout) { clearTimeout(musicTimeout); musicTimeout = null; }
}

// ---- DATA ----
const ETYPES = [
  { app:'📧 Gmail',      title:'¿Llegaste a ver',  body:'mi propuesta?',    color:'#00ff88', hp:1, speed:38, pts:10 },
  { app:'📧 Gmail',      title:'URGENTE!!!',        body:'Necesito para hoy',color:'#ffaa00', hp:2, speed:55, pts:20 },
  { app:'💬 Slack',      title:'¿Hacemos una',      body:'llamada rápida?',  color:'#a78bfa', hp:1, speed:45, pts:15, zigzag:true },
  { app:'🔔 Sistema',    title:'Te mando feedback', body:'el lunes',         color:'#38bdf8', hp:1, speed:42, pts:15 },
  { app:'📅 Calendario', title:'⚠️ REUNIÓN',        body:'En 5 minutos!',    color:'#ff3333', hp:3, speed:65, pts:40 },
];
const PTYPES = [
  { label:'🌴 Fuera de Oficina', color:'#00ff88', key:'oof'      },
  { label:'🛡️ Shield',           color:'#38bdf8', key:'shield'   },
  { label:'✈️ Vacaciones',        color:'#ffaa00', key:'vacation' },
];

// ---- STATE ----
let state = 'menu';
let score, level, speedMult, shielded, frozen, frozenTimer, shieldTimer;
let bullets, enemies, powerups, particles, floats;
let player, shootTimer, enemyTimer, diffTimer, powerupTimer;
let lastKillerTitle='', lastKillerBody='', lastKillerApp='', lastKillerColor='#ff3333';
let keys = {};

function initGame() {
  score=0; level=1; speedMult=1;
  shielded=false; frozen=false; frozenTimer=0; shieldTimer=0;
  bullets=[]; enemies=[]; powerups=[]; particles=[]; floats=[];
  player={ x:W/2, y:H-65, vx:0 };
  shootTimer=0; enemyTimer=0; diffTimer=0; powerupTimer=0;
  lastKillerTitle=''; lastKillerBody=''; lastKillerApp=''; lastKillerColor='#ff3333';
  startMusic();
}

// ---- INPUT ----
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// Start button rect in canvas coords
const BTN = { x: W/2-115, y: 572, w: 230, h: 46 };

function handleStart(cx, cy) {
  // cx, cy in canvas logical coords
  if (cx >= BTN.x && cx <= BTN.x+BTN.w && cy >= BTN.y && cy <= BTN.y+BTN.h) {
    au(); state = 'game'; initGame();
  }
}
function handleRestart(cx, cy) {
  const bx = W/2-120, by = 448, bw = 240, bh = 50;
  if (cx >= bx && cx <= bx+bw && cy >= by && cy <= by+bh) {
    state='game'; initGame();
  }
}

let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); au();
  const rect = canvas.getBoundingClientRect();
  const tx = (e.touches[0].clientX - rect.left) / (rect.width  / W);
  const ty = (e.touches[0].clientY - rect.top)  / (rect.height / H);
  if (state === 'menu')     { handleStart(tx, ty); return; }
  if (state === 'gameover') { handleRestart(tx, ty); return; }
  touchX = tx;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - rect.left) / (rect.width / W);
}, { passive: false });

canvas.addEventListener('touchend', e => { e.preventDefault(); touchX = null; }, { passive: false });

canvas.addEventListener('click', e => {
  au();
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / (rect.width  / W);
  const cy = (e.clientY - rect.top)  / (rect.height / H);
  if (state === 'menu')     { handleStart(cx, cy); return; }
  if (state === 'gameover') { handleRestart(cx, cy); return; }
});

document.addEventListener('keydown', e => {
  if ((e.key === ' ' || e.key === 'Enter') && state === 'gameover') {
    state = 'game'; initGame();
  }
});

// ---- HELPERS ----
function rand(a,b)  { return a + Math.random()*(b-a); }
function randi(a,b) { return Math.floor(rand(a, b+0.999)); }

function spawnParticles(x,y,color,n=8) {
  for (let i=0;i<n;i++) {
    const a=(i/n)*Math.PI*2+rand(-0.3,0.3), spd=rand(30,100);
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color,r:rand(2,4)});
  }
}
function spawnFloat(x,y,text,color) {
  floats.push({x,y,text,color,life:1,vy:-32});
}

// ---- DRAW UTILS ----
function roundRect(x,y,w,h,r,fill,stroke,sw=1.5) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  if (fill)   { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke(); }
}

function drawBG(gc) {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=gc; ctx.lineWidth=0.5;
  for (let x=0;x<W;x+=30) { ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for (let y=0;y<H;y+=30) { ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  ctx.fillStyle='rgba(0,0,0,0.12)';
  for (let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);
}

function drawCard(cx,cy,t,hpCur,hpMax,alpha=1) {
  const x=cx-CARD_W/2, y=cy-CARD_H/2;
  ctx.globalAlpha=alpha;
  ctx.shadowColor=t.color; ctx.shadowBlur=10;
  roundRect(x,y,CARD_W,CARD_H,10,t.color+'1a',t.color,1.8);
  ctx.shadowBlur=0;

  // App bar
  ctx.save();
  ctx.beginPath(); ctx.rect(x,y,CARD_W,CARD_TOP);
  ctx.clip();
  roundRect(x,y,CARD_W,CARD_TOP+10,10,t.color+'55',null);
  ctx.restore();

  // App name
  ctx.fillStyle=t.color; ctx.font='bold 9px Courier New'; ctx.textAlign='left';
  ctx.fillText(t.app, x+7, y+14);

  // HP dots
  for (let i=0;i<hpMax;i++) {
    ctx.beginPath(); ctx.arc(x+CARD_W-7-i*11, y+10, 4, 0, Math.PI*2);
    ctx.fillStyle=i<hpCur?t.color:'#333'; ctx.fill();
  }

  // Clipped text area
  ctx.save();
  ctx.beginPath(); ctx.rect(x+CARD_PAD, y+CARD_TOP+2, CARD_W-CARD_PAD*2, CARD_BODY-4);
  ctx.clip();
  ctx.fillStyle='#ffffff'; ctx.font='bold 12px Courier New'; ctx.textAlign='left';
  ctx.fillText(t.title, x+CARD_PAD, y+CARD_TOP+16);
  ctx.fillStyle=t.color+'cc'; ctx.font='11px Courier New';
  ctx.fillText(t.body,  x+CARD_PAD, y+CARD_TOP+30);
  ctx.restore();

  ctx.globalAlpha=1;
}

function drawPlayer() {
  const px=player.x, py=player.y;
  roundRect(px-20,py-12,40,22,4,'#00cc66','#00ff88',2);
  roundRect(px-16,py-9,32,15,3,'#001a0d',null);
  ctx.fillStyle='#00ff4422'; ctx.fillRect(px-14,py-8,12,7);
  ctx.fillStyle='#00cc66';   ctx.fillRect(px-22,py+10,44,5);
  ctx.beginPath(); ctx.arc(px,py-15,5,0,Math.PI*2);
  ctx.fillStyle='#00ffff44'; ctx.fill();
  if (shielded) {
    ctx.beginPath(); ctx.arc(px,py,32,0,Math.PI*2);
    ctx.strokeStyle='#38bdf8'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.fillStyle='#38bdf810'; ctx.fill();
  }
}

function drawBullet(b) {
  // Fade out near the top limit
  const fadeStart = BULLET_MAX_Y + 40;
  const alpha = b.y < fadeStart ? Math.max(0,(b.y-BULLET_MAX_Y)/40) : 1;
  ctx.globalAlpha = alpha;
  const grad=ctx.createLinearGradient(b.x,b.y,b.x,b.y+14);
  grad.addColorStop(0,'#00ffff'); grad.addColorStop(1,'#005588');
  ctx.fillStyle=grad; ctx.fillRect(b.x-2.5,b.y,5,14);
  ctx.beginPath(); ctx.arc(b.x,b.y+2,5,0,Math.PI*2);
  ctx.fillStyle='#00ffff2a'; ctx.fill();
  ctx.globalAlpha=1;
}

function drawPowerup(p) {
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const r=i%2===0?15:6, a=(i/10)*Math.PI*2-Math.PI/2;
    if (i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else       ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle=p.type.color; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
  ctx.fillStyle=p.type.color; ctx.font='bold 10px Courier New'; ctx.textAlign='center';
  ctx.fillText(p.type.label,p.x,p.y+26);
}

// ---- SCENES ----
function drawMenu() {
  drawBG('rgba(0,50,0,0.25)');
  ctx.textAlign='center';

  // Title
  ctx.font='bold 68px Courier New';
  ctx.fillStyle='#003300'; ctx.fillText('INBOX',W/2+3,110);
  ctx.fillStyle='#00ff88'; ctx.fillText('INBOX',W/2,107);
  ctx.fillStyle='#330000'; ctx.fillText('ZERO', W/2+3,178);
  ctx.fillStyle='#ff3333'; ctx.fillText('ZERO', W/2,175);

  ctx.font='13px Courier New'; ctx.fillStyle='#555';
  ctx.fillText('destruí tus notificaciones',W/2,202);

  // Enemy preview cards in 3 columns
  ctx.font='bold 11px Courier New'; ctx.fillStyle='#777';
  ctx.fillText('— ENEMIGOS —',W/2,230);
  const cols=3, colW=W/cols;
  ETYPES.forEach((t,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const cx=colW*col+colW/2;
    const cy=260+row*(CARD_H+12);
    drawCard(cx,cy,t,t.hp,t.hp,0.8);
  });

  // Controls & powerups
  ctx.textAlign='center';
  ctx.font='bold 12px Courier New'; ctx.fillStyle='#00ff88';
  ctx.fillText('[ CONTROLES ]',W/2,440);
  ctx.font='11px Courier New'; ctx.fillStyle='#555';
  ctx.fillText('← → ó A D  •  toca izq/der en móvil',W/2,456);

  ctx.font='bold 12px Courier New'; ctx.fillStyle='#ffaa00';
  ctx.fillText('[ POWER-UPS ]',W/2,482);
  ctx.font='11px Courier New'; ctx.fillStyle='#555';
  ['🌴 Fuera Oficina — pausa 5s','🛡️ Shield — protección','✈️ Vacaciones — limpia pantalla'].forEach((t,i)=>{
    ctx.fillText(t,W/2,498+i*16);
  });

  // START BUTTON — only clickable element
  const bx=BTN.x, by=BTN.y, bw=BTN.w, bh=BTN.h;
  const pulse=0.6+0.4*Math.sin(Date.now()/400);
  ctx.globalAlpha=pulse;
  roundRect(bx,by,bw,bh,10,'#00ff88',null);
  ctx.fillStyle='#000'; ctx.font='bold 19px Courier New'; ctx.textAlign='center';
  ctx.fillText('▶  EMPEZAR  ◀',W/2,by+bh/2+7);
  ctx.globalAlpha=1;

  ctx.font='10px Courier New'; ctx.fillStyle='#333';
  ctx.fillText('🔊 activá el volumen',W/2,630);
}

function drawGame() {
  drawBG('rgba(0,40,0,0.18)');

  // Destroy zone line (subtle)
  ctx.strokeStyle='rgba(255,255,0,0.12)';
  ctx.lineWidth=1;
  ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(0,DESTROY_ZONE_Y); ctx.lineTo(W,DESTROY_ZONE_Y); ctx.stroke();
  ctx.setLineDash([]);

  drawPlayer();
  bullets.forEach(drawBullet);
  enemies.forEach(e => drawCard(e.x,e.y,e.type,e.hp,e.maxHp));
  powerups.forEach(drawPowerup);

  particles.forEach(p => {
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  });
  ctx.globalAlpha=1;

  floats.forEach(f => {
    ctx.globalAlpha=Math.max(0,f.life);
    ctx.fillStyle=f.color; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
    ctx.globalAlpha=1;
  });

  ctx.textAlign='left'; ctx.font='bold 18px Courier New'; ctx.fillStyle='#00ff88';
  ctx.fillText('SCORE: '+score,12,28);
  ctx.font='13px Courier New'; ctx.fillStyle='#555';
  ctx.fillText('NIVEL: '+level,12,46);

  if (frozen) {
    ctx.fillStyle='#00ff8810'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.fillStyle='#00ff88';
    ctx.font='bold 16px Courier New'; ctx.fillText('🌴 FUERA DE OFICINA',W/2,68);
  }

  ctx.textAlign='center'; ctx.fillStyle='#ffffff12';
  ctx.font='11px Courier New'; ctx.fillText('← toca izq     toca der →',W/2,H-10);
}

function drawGameOver() {
  drawBG('rgba(40,0,0,0.3)');
  ctx.textAlign='center';

  ctx.font='bold 52px Courier New';
  ctx.fillStyle='#330000'; ctx.fillText('GAME OVER',W/2+3,158);
  ctx.fillStyle='#ff3333'; ctx.fillText('GAME OVER',W/2,155);
  ctx.font='13px Courier New'; ctx.fillStyle='#555';
  ctx.fillText('fuiste aplastado por el trabajo',W/2,182);

  roundRect(W/2-130,198,260,85,10,'#ff000012','#ff333355',1.5);
  ctx.font='12px Courier New'; ctx.fillStyle='#ff3333'; ctx.fillText('SCORE FINAL',W/2,222);
  ctx.font='bold 48px Courier New'; ctx.fillStyle='#fff'; ctx.fillText(score,W/2,268);
  ctx.font='13px Courier New'; ctx.fillStyle='#666'; ctx.fillText('NIVEL: '+level,W/2,292);

  if (lastKillerTitle) {
    ctx.font='bold 12px Courier New'; ctx.fillStyle='#ff3333';
    ctx.fillText('TE MATÓ ESTO:',W/2,330);
    drawCard(W/2,378,{app:lastKillerApp,title:lastKillerTitle,body:lastKillerBody,color:lastKillerColor},0,1,1);
  }

  ctx.font='12px Courier New'; ctx.fillStyle='#444';
  ctx.fillText('¿seguís trabajando?',W/2,432);

  const pulse=0.5+0.5*Math.sin(Date.now()/400);
  ctx.globalAlpha=0.5+pulse*0.5;
  roundRect(W/2-120,448,240,50,10,'#ff3333',null);
  ctx.fillStyle='#000'; ctx.font='bold 19px Courier New';
  ctx.fillText('↺  REINTENTAR',W/2,479);
  ctx.globalAlpha=1;

  ctx.font='12px Courier New'; ctx.fillStyle='#444';
  ctx.fillText('toca el botón o presiona Enter',W/2,524);
}

// ---- UPDATE ----
let lastTime = 0;
function update(dt) {
  if (state !== 'game') return;

  shootTimer+=dt; enemyTimer+=dt; diffTimer+=dt; powerupTimer+=dt;
  if (frozen)  { frozenTimer+=dt;  if (frozenTimer>5)  { frozen=false;   frozenTimer=0; } }
  if (shielded){ shieldTimer+=dt;  if (shieldTimer>8)  { shielded=false; shieldTimer=0; } }

  // Player move
  const spd=260; player.vx=0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) player.vx=-spd;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx= spd;
  if (touchX!==null) {
    if (touchX < player.x-20) player.vx=-spd;
    else if (touchX > player.x+20) player.vx=spd;
  }
  player.x=Math.max(24,Math.min(W-24, player.x+player.vx*dt));

  // Shoot
  if (shootTimer>0.28) {
    shootTimer=0;
    bullets.push({x:player.x, y:player.y-20, vy:-460});
    playShoot();
  }

  // Spawn enemy
  const spawnDelay=Math.max(0.55, 1.5-(level-1)*0.08);
  if (enemyTimer>spawnDelay) {
    enemyTimer=0;
    const t=ETYPES[randi(0,ETYPES.length-1)];
    enemies.push({
      x: rand(CARD_W/2+8, W-CARD_W/2-8),
      y: -CARD_H/2-5,
      type:t, hp:t.hp, maxHp:t.hp,
      vy:t.speed*speedMult,
      zigzag:t.zigzag||false,
      zigDir:Math.random()>0.5?1:-1, zigTimer:0
    });
  }

  // Spawn powerup
  if (powerupTimer>9) {
    powerupTimer=0;
    if (Math.random()<0.5) {
      const t=PTYPES[randi(0,PTYPES.length-1)];
      powerups.push({x:rand(50,W-50),y:-30,vy:58,type:t,rot:0});
    }
  }

  // Difficulty
  if (diffTimer>12) {
    diffTimer=0; speedMult+=0.1; level++;
    spawnFloat(W/2,H/2,'⚡ NIVEL '+level,'#ffaa00');
  }

  // Move bullets — stop at BULLET_MAX_Y
  bullets.forEach(b => b.y+=b.vy*dt);
  bullets = bullets.filter(b => b.y > BULLET_MAX_Y);

  // Move enemies
  if (!frozen) {
    enemies.forEach(e => {
      e.y+=e.vy*dt;
      if (e.zigzag) {
        e.zigTimer+=dt;
        if (e.zigTimer>0.9) { e.zigDir*=-1; e.zigTimer=0; }
        e.x+=e.zigDir*65*speedMult*dt;
        e.x=Math.max(CARD_W/2+5, Math.min(W-CARD_W/2-5, e.x));
      }
    });
  }
  powerups.forEach(p=>{ p.y+=p.vy*dt; p.rot+=dt*1.8; });
  powerups=powerups.filter(p=>p.y<H+50);

  // Bullet vs enemy — only if enemy is below DESTROY_ZONE_Y
  for (let bi=bullets.length-1;bi>=0;bi--) {
    const b=bullets[bi];
    for (let ei=enemies.length-1;ei>=0;ei--) {
      const e=enemies[ei];
      if (e.y < DESTROY_ZONE_Y) continue; // not yet in destroy zone
      if (Math.abs(b.x-e.x)<CARD_W/2+2 && Math.abs(b.y-e.y)<CARD_H/2+2) {
        bullets.splice(bi,1);
        e.hp--;
        spawnParticles(e.x,e.y,e.type.color,4);
        if (e.hp<=0) {
          score+=e.type.pts;
          spawnParticles(e.x,e.y,e.type.color,12);
          spawnFloat(e.x,e.y,'✓ +'+e.type.pts,e.type.color);
          playBoom(); enemies.splice(ei,1);
        }
        break;
      }
    }
  }

  // Player vs enemy
  for (let ei=enemies.length-1;ei>=0;ei--) {
    const e=enemies[ei];
    if (Math.abs(player.x-e.x)<CARD_W/2-6 && Math.abs(player.y-e.y)<CARD_H/2) {
      if (shielded) {
        shielded=false; shieldTimer=0;
        spawnParticles(e.x,e.y,'#38bdf8',12);
        enemies.splice(ei,1);
        spawnFloat(player.x,player.y-50,'🛡️ ESCUDO ROTO','#38bdf8');
        continue;
      }
      lastKillerTitle=e.type.title; lastKillerBody=e.type.body;
      lastKillerApp=e.type.app;    lastKillerColor=e.type.color;
      playDeath(); state='gameover'; break;
    }
  }
  enemies=enemies.filter(e=>e.y<H+CARD_H);

  // Player vs powerup
  for (let pi=powerups.length-1;pi>=0;pi--) {
    const p=powerups[pi];
    if (Math.abs(player.x-p.x)<32 && Math.abs(player.y-p.y)<32) {
      playPowerup();
      spawnFloat(player.x,player.y-55,p.type.label,p.type.color);
      if (p.type.key==='oof')      { frozen=true; frozenTimer=0; }
      if (p.type.key==='shield')   { shielded=true; shieldTimer=0; }
      if (p.type.key==='vacation') {
        enemies.forEach(e=>{score+=e.type.pts; spawnParticles(e.x,e.y,e.type.color,8);});
        enemies=[]; spawnFloat(W/2,H/2,'✈️ MODO VACACIONES!','#ffaa00');
      }
      powerups.splice(pi,1);
    }
  }

  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=55*dt;p.life-=dt*2;});
  particles=particles.filter(p=>p.life>0);
  floats.forEach(f=>{f.y+=f.vy*dt;f.life-=dt*1.1;});
  floats=floats.filter(f=>f.life>0);
}

// ---- LOOP ----
function loop(ts) {
  const dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  // No scale here — already applied in resize()
  ctx.save();
  update(dt);
  if      (state==='menu')     drawMenu();
  else if (state==='game')     drawGame();
  else if (state==='gameover') drawGameOver();
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTime=ts; requestAnimationFrame(loop);});
</script>
</body>
</html>
