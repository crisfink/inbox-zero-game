<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>INBOX ZERO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    touch-action: none;
  }
  canvas {
    display: block;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ---- CANVAS SETUP (9:16) ----
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 390, H = 693; // 9:16 ratio

let scale = 1;
function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / W, wh / H);
  canvas.width  = Math.round(W * scale);
  canvas.height = Math.round(H * scale);
}
resize();
window.addEventListener('resize', () => { resize(); });

// ---- AUDIO ----
let audioCtx;
function au() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function beep(freq, type, dur, vol = 0.1) {
  try {
    const c = au(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch (e) {}
}
function playShoot()   { beep(880, 'square', 0.05, 0.07); }
function playBoom()    { beep(100, 'sawtooth', 0.18, 0.2); }
function playDeath()   { beep(200, 'sawtooth', 0.6, 0.3); }
function playPowerup() { [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f,'sine',0.15,0.18), i*80)); }

// ---- ENEMY DATA ----
// speed values are slow so messages are readable
const ETYPES = [
  {
    title:  '¿LLEGASTE A VER',
    body:   'mi propuesta?',
    app:    '📧 Gmail',
    color:  '#00ff88',
    hp: 1, speed: 42, pts: 10
  },
  {
    title:  'URGENTE!!!',
    body:   'Necesito para hoy',
    app:    '📧 Gmail',
    color:  '#ffaa00',
    hp: 2, speed: 60, pts: 20
  },
  {
    title:  '¿HACEMOS UNA',
    body:   'llamada rápida?',
    app:    '💬 Slack',
    color:  '#a78bfa',
    hp: 1, speed: 50, pts: 15, zigzag: true
  },
  {
    title:  'TE MANDO FEEDBACK',
    body:   'el lunes, prometido',
    app:    '🔔 Notificación',
    color:  '#38bdf8',
    hp: 1, speed: 48, pts: 15
  },
  {
    title:  '⚠️ REUNIÓN URGENTE',
    body:   'En 5 minutos',
    app:    '📅 Calendario',
    color:  '#ff3333',
    hp: 3, speed: 70, pts: 40
  },
];

const PTYPES = [
  { label: '🌴 Fuera de Oficina', color: '#00ff88', key: 'oof'      },
  { label: '🛡️  Shield',          color: '#38bdf8', key: 'shield'   },
  { label: '✈️  Modo Vacaciones',  color: '#ffaa00', key: 'vacation' },
];

// ---- STATE ----
let state = 'menu';
let score, level, speedMult, shielded, frozen, frozenTimer, shieldTimer;
let bullets, enemies, powerups, particles, floats;
let player, shootTimer, enemyTimer, diffTimer, powerupTimer;
let lastKillerTitle = '', lastKillerBody = '';
let keys = {};

function initGame() {
  score = 0; level = 1; speedMult = 1;
  shielded = false; frozen = false; frozenTimer = 0; shieldTimer = 0;
  bullets = []; enemies = []; powerups = []; particles = []; floats = [];
  player = { x: W / 2, y: H - 65, vx: 0 };
  shootTimer = 0; enemyTimer = 0; diffTimer = 0; powerupTimer = 0;
  lastKillerTitle = ''; lastKillerBody = '';
}

// ---- INPUT ----
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); au();
  if (state === 'menu')     { state = 'game'; initGame(); return; }
  if (state === 'gameover') { state = 'game'; initGame(); return; }
  touchX = e.touches[0].clientX / scale;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX / scale;
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); touchX = null; }, { passive: false });
canvas.addEventListener('click', () => {
  au();
  if (state === 'menu')     { state = 'game'; initGame(); }
  else if (state === 'gameover') { state = 'game'; initGame(); }
});
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') {
    if (state === 'menu')     { au(); state = 'game'; initGame(); }
    else if (state === 'gameover') { state = 'game'; initGame(); }
  }
});

// ---- HELPERS ----
function rand(a, b)  { return a + Math.random() * (b - a); }
function randi(a, b) { return Math.floor(rand(a, b + 0.999)); }

function spawnParticles(x, y, color, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + rand(-0.3, 0.3);
    const spd = rand(40, 130);
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, color, r: rand(2, 5) });
  }
}
function spawnFloat(x, y, text, color) {
  floats.push({ x, y, text, color, life: 1, vy: -38 });
}

// ---- DRAW UTILITIES ----
function roundRect(x, y, w, h, r, fill, stroke, strokeW = 1.5) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.stroke(); }
}

function drawBG(gridColor) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 1);
}

// ---- NOTIFICATION CARD ENEMY ----
// Card dimensions
const CARD_W = 300, CARD_H = 88;

function drawEnemy(e) {
  const cx = e.x, cy = e.y;
  const x = cx - CARD_W / 2, y = cy - CARD_H / 2;
  const t = e.type;

  // Glow behind card
  ctx.save();
  ctx.shadowColor = t.color;
  ctx.shadowBlur = 18;
  roundRect(x, y, CARD_W, CARD_H, 14, t.color + '18', t.color, 2);
  ctx.restore();

  // Top bar (app name)
  roundRect(x, y, CARD_W, 26, 14, t.color + '44', null);
  // clip top bar corners bottom
  ctx.fillStyle = t.color + '44';
  ctx.fillRect(x, y + 14, CARD_W, 12);

  // App label
  ctx.fillStyle = t.color;
  ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(t.app, x + 12, y + 17);

  // HP dots (top right)
  for (let i = 0; i < e.maxHp; i++) {
    ctx.beginPath();
    ctx.arc(x + CARD_W - 12 - i * 14, y + 13, 5, 0, Math.PI * 2);
    ctx.fillStyle = i < e.hp ? t.color : '#333';
    ctx.fill();
  }

  // Title (big, bold)
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  // clip title to card width
  ctx.save();
  ctx.beginPath();
  ctx.rect(x + 10, y + 28, CARD_W - 20, 22);
  ctx.clip();
  ctx.fillText(t.title, x + 12, y + 44);
  ctx.restore();

  // Body (smaller)
  ctx.fillStyle = t.color + 'dd';
  ctx.font = '13px Courier New';
  ctx.textAlign = 'left';
  ctx.save();
  ctx.beginPath();
  ctx.rect(x + 10, y + 52, CARD_W - 20, 20);
  ctx.clip();
  ctx.fillText(t.body, x + 12, y + 67);
  ctx.restore();
}

function drawPlayer() {
  const px = player.x, py = player.y;
  // Laptop base
  roundRect(px - 24, py - 14, 48, 26, 4, '#00cc66', '#00ff88', 2);
  // Screen
  roundRect(px - 19, py - 11, 38, 18, 3, '#001a0d', null);
  // Screen glow
  ctx.fillStyle = '#00ff4422'; ctx.fillRect(px - 17, py - 9, 14, 8);
  // Base bar
  ctx.fillStyle = '#00cc66'; ctx.fillRect(px - 26, py + 12, 52, 5);
  // Muzzle glow
  ctx.beginPath(); ctx.arc(px, py - 16, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#00ffff55'; ctx.fill();
  // Shield
  if (shielded) {
    ctx.beginPath(); ctx.arc(px, py, 36, 0, Math.PI * 2);
    ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.fillStyle = '#38bdf812'; ctx.fill();
  }
}

function drawBullet(b) {
  const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + 14);
  grad.addColorStop(0, '#00ffff');
  grad.addColorStop(1, '#005588');
  ctx.fillStyle = grad;
  ctx.fillRect(b.x - 2.5, b.y, 5, 14);
  ctx.beginPath(); ctx.arc(b.x, b.y + 2, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#00ffff33'; ctx.fill();
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? 16 : 7;
    const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fillStyle = p.type.color; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
  ctx.fillStyle = p.type.color;
  ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(p.type.label, p.x, p.y + 28);
}

// ---- SCENES ----
function drawMenu() {
  drawBG('rgba(0,50,0,0.25)');
  ctx.textAlign = 'center';

  // Title
  ctx.font = 'bold 72px Courier New';
  ctx.fillStyle = '#003300'; ctx.fillText('INBOX', W/2+3, 118);
  ctx.fillStyle = '#00ff88'; ctx.fillText('INBOX', W/2, 115);
  ctx.fillStyle = '#330000'; ctx.fillText('ZERO',  W/2+3, 190);
  ctx.fillStyle = '#ff3333'; ctx.fillText('ZERO',  W/2, 187);

  ctx.font = '14px Courier New'; ctx.fillStyle = '#555';
  ctx.fillText('destruí tus notificaciones', W/2, 218);

  // Mini enemy previews
  ctx.font = 'bold 13px Courier New'; ctx.fillStyle = '#888';
  ctx.fillText('ENEMIGOS', W/2, 258);
  ETYPES.forEach((t, i) => {
    const rowY = 278 + i * 42;
    const miniW = 310, miniH = 34;
    const mx = W/2 - miniW/2;
    roundRect(mx, rowY, miniW, miniH, 8, t.color + '15', t.color + '88', 1.2);
    ctx.fillStyle = t.color;
    ctx.font = 'bold 12px Courier New'; ctx.textAlign = 'left';
    ctx.fillText(t.app, mx + 10, rowY + 14);
    ctx.fillStyle = '#fff';
    ctx.font = '12px Courier New';
    ctx.fillText(t.title + ' ' + t.body, mx + 10, rowY + 27);
  });

  // Controls
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Courier New'; ctx.fillStyle = '#00ff88';
  ctx.fillText('[ CONTROLES ]', W/2, 504);
  ctx.font = '12px Courier New'; ctx.fillStyle = '#555';
  ctx.fillText('← → o A D  •  toca izq/der en móvil', W/2, 522);
  ctx.fillText('disparo automático', W/2, 540);

  // Power-ups
  ctx.font = 'bold 13px Courier New'; ctx.fillStyle = '#ffaa00';
  ctx.fillText('[ POWER-UPS ]', W/2, 570);
  ctx.font = '12px Courier New'; ctx.fillStyle = '#555';
  ['🌴 Fuera de Oficina — pausa 5s', '🛡️ Shield — protección', '✈️ Vacaciones — limpia pantalla'].forEach((t, i) => {
    ctx.fillText(t, W/2, 588 + i * 17);
  });

  // Start button
  const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  roundRect(W/2 - 120, 648, 240, 50, 10, '#00ff88', null);
  ctx.fillStyle = '#000'; ctx.font = 'bold 20px Courier New';
  ctx.fillText('▶  EMPEZAR  ◀', W/2, 679);
  ctx.globalAlpha = 1;
}

function drawGame() {
  drawBG('rgba(0,40,0,0.18)');
  drawPlayer();
  bullets.forEach(drawBullet);
  enemies.forEach(drawEnemy);
  powerups.forEach(drawPowerup);

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Floats
  floats.forEach(f => {
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.fillStyle = f.color;
    ctx.font = 'bold 13px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    ctx.globalAlpha = 1;
  });

  // HUD
  ctx.textAlign = 'left';
  ctx.font = 'bold 18px Courier New'; ctx.fillStyle = '#00ff88';
  ctx.fillText('SCORE: ' + score, 12, 28);
  ctx.font = '14px Courier New'; ctx.fillStyle = '#555';
  ctx.fillText('NIVEL: ' + level, 12, 48);

  if (frozen) {
    ctx.fillStyle = '#00ff8812'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 17px Courier New';
    ctx.fillText('🌴 FUERA DE OFICINA', W/2, 72);
  }

  ctx.textAlign = 'center'; ctx.fillStyle = '#ffffff14';
  ctx.font = '12px Courier New';
  ctx.fillText('← toca izq     toca der →', W/2, H - 10);
}

function drawGameOver() {
  drawBG('rgba(40,0,0,0.3)');
  ctx.textAlign = 'center';

  ctx.font = 'bold 56px Courier New';
  ctx.fillStyle = '#330000'; ctx.fillText('GAME OVER', W/2+3, 158);
  ctx.fillStyle = '#ff3333'; ctx.fillText('GAME OVER', W/2, 155);

  ctx.font = '14px Courier New'; ctx.fillStyle = '#555';
  ctx.fillText('fuiste aplastado por el trabajo', W/2, 185);

  // Score box
  roundRect(W/2 - 140, 205, 280, 90, 10, '#ff000012', '#ff333355', 1.5);
  ctx.font = '13px Courier New'; ctx.fillStyle = '#ff3333';
  ctx.fillText('SCORE FINAL', W/2, 232);
  ctx.font = 'bold 50px Courier New'; ctx.fillStyle = '#fff';
  ctx.fillText(score, W/2, 282);
  ctx.font = '14px Courier New'; ctx.fillStyle = '#666';
  ctx.fillText('NIVEL: ' + level, W/2, 306);

  // Killer notification card
  if (lastKillerTitle) {
    ctx.font = 'bold 13px Courier New'; ctx.fillStyle = '#ff3333';
    ctx.fillText('TE MATÓ ESTO:', W/2, 345);
    // draw a mini notification card
    const kx = W/2 - CARD_W/2, ky = 355;
    roundRect(kx, ky, CARD_W, CARD_H, 14, '#ff000018', '#ff3333', 2);
    roundRect(kx, ky, CARD_W, 26, 14, '#ff333344', null);
    ctx.fillStyle = '#ff3333';
    ctx.font = 'bold 12px Courier New'; ctx.textAlign = 'left';
    ctx.fillText('📅 Calendario', kx + 12, ky + 17);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px Courier New';
    ctx.save(); ctx.beginPath(); ctx.rect(kx+10, ky+28, CARD_W-20, 22); ctx.clip();
    ctx.fillText(lastKillerTitle, kx + 12, ky + 44);
    ctx.restore();
    ctx.fillStyle = '#ff8888';
    ctx.font = '13px Courier New';
    ctx.save(); ctx.beginPath(); ctx.rect(kx+10, ky+52, CARD_W-20, 20); ctx.clip();
    ctx.fillText(lastKillerBody, kx + 12, ky + 67);
    ctx.restore();
  }

  ctx.textAlign = 'center';
  ctx.font = '13px Courier New'; ctx.fillStyle = '#444';
  ctx.fillText('¿seguís trabajando?', W/2, 465);

  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = 0.5 + pulse * 0.5;
  roundRect(W/2 - 125, 485, 250, 52, 10, '#ff3333', null);
  ctx.fillStyle = '#000'; ctx.font = 'bold 20px Courier New';
  ctx.fillText('↺  REINTENTAR', W/2, 517);
  ctx.globalAlpha = 1;

  ctx.font = '12px Courier New'; ctx.fillStyle = '#444';
  ctx.fillText('toca o presiona cualquier tecla', W/2, 560);
}

// ---- UPDATE ----
let lastTime = 0;

function update(dt) {
  if (state !== 'game') return;

  shootTimer  += dt; enemyTimer  += dt;
  diffTimer   += dt; powerupTimer += dt;

  if (frozen)  { frozenTimer  += dt; if (frozenTimer  > 5) { frozen   = false; frozenTimer  = 0; } }
  if (shielded){ shieldTimer  += dt; if (shieldTimer  > 8) { shielded = false; shieldTimer  = 0; } }

  // Player move
  const spd = 260; player.vx = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) player.vx = -spd;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx =  spd;
  if (touchX !== null) {
    if (touchX < player.x - 20) player.vx = -spd;
    else if (touchX > player.x + 20) player.vx =  spd;
  }
  player.x = Math.max(28, Math.min(W - 28, player.x + player.vx * dt));

  // Shoot
  if (shootTimer > 0.30) {
    shootTimer = 0;
    bullets.push({ x: player.x, y: player.y - 20, vy: -500 });
    playShoot();
  }

  // Spawn enemy
  const spawnDelay = Math.max(0.5, 1.4 - (level - 1) * 0.08);
  if (enemyTimer > spawnDelay) {
    enemyTimer = 0;
    const t = ETYPES[randi(0, ETYPES.length - 1)];
    enemies.push({
      x: rand(CARD_W / 2 + 10, W - CARD_W / 2 - 10),
      y: -CARD_H / 2 - 10,
      type: t, hp: t.hp, maxHp: t.hp,
      vy: t.speed * speedMult,
      zigzag: t.zigzag || false,
      zigDir: Math.random() > 0.5 ? 1 : -1, zigTimer: 0
    });
  }

  // Spawn powerup
  if (powerupTimer > 9) {
    powerupTimer = 0;
    if (Math.random() < 0.5) {
      const t = PTYPES[randi(0, PTYPES.length - 1)];
      powerups.push({ x: rand(50, W - 50), y: -30, vy: 65, type: t, rot: 0 });
    }
  }

  // Difficulty
  if (diffTimer > 12) {
    diffTimer = 0; speedMult += 0.1; level++;
    spawnFloat(W / 2, H / 2, '⚡ NIVEL ' + level, '#ffaa00');
  }

  // Move bullets
  bullets.forEach(b => b.y += b.vy * dt);
  bullets = bullets.filter(b => b.y > -20);

  // Move enemies
  if (!frozen) {
    enemies.forEach(e => {
      e.y += e.vy * dt;
      if (e.zigzag) {
        e.zigTimer += dt;
        if (e.zigTimer > 0.9) { e.zigDir *= -1; e.zigTimer = 0; }
        e.x += e.zigDir * 70 * speedMult * dt;
        e.x = Math.max(CARD_W/2 + 5, Math.min(W - CARD_W/2 - 5, e.x));
      }
    });
  }

  // Move powerups
  powerups.forEach(p => { p.y += p.vy * dt; p.rot += dt * 1.8; });
  powerups = powerups.filter(p => p.y < H + 50);

  // Bullet vs enemy
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (Math.abs(b.x - e.x) < CARD_W/2 + 4 && Math.abs(b.y - e.y) < CARD_H/2 + 4) {
        bullets.splice(bi, 1);
        e.hp--;
        spawnParticles(e.x, e.y, e.type.color, 4);
        if (e.hp <= 0) {
          score += e.type.pts;
          spawnParticles(e.x, e.y, e.type.color, 14);
          spawnFloat(e.x, e.y, '✓ ELIMINADO  +' + e.type.pts, e.type.color);
          playBoom();
          enemies.splice(ei, 1);
        }
        break;
      }
    }
  }

  // Player vs enemy
  for (let ei = enemies.length - 1; ei >= 0; ei--) {
    const e = enemies[ei];
    if (Math.abs(player.x - e.x) < CARD_W/2 - 10 && Math.abs(player.y - e.y) < CARD_H/2) {
      if (shielded) {
        shielded = false; shieldTimer = 0;
        spawnParticles(e.x, e.y, '#38bdf8', 12);
        enemies.splice(ei, 1);
        spawnFloat(player.x, player.y - 50, '🛡️ ESCUDO ROTO', '#38bdf8');
        continue;
      }
      lastKillerTitle = e.type.title;
      lastKillerBody  = e.type.body;
      playDeath();
      state = 'gameover';
      break;
    }
  }
  enemies = enemies.filter(e => e.y < H + CARD_H);

  // Player vs powerup
  for (let pi = powerups.length - 1; pi >= 0; pi--) {
    const p = powerups[pi];
    if (Math.abs(player.x - p.x) < 34 && Math.abs(player.y - p.y) < 34) {
      playPowerup();
      spawnFloat(player.x, player.y - 60, p.type.label, p.type.color);
      if (p.type.key === 'oof')      { frozen = true; frozenTimer = 0; }
      if (p.type.key === 'shield')   { shielded = true; shieldTimer = 0; }
      if (p.type.key === 'vacation') {
        enemies.forEach(e => { score += e.type.pts; spawnParticles(e.x, e.y, e.type.color, 8); });
        enemies = [];
        spawnFloat(W/2, H/2, '✈️ MODO VACACIONES!', '#ffaa00');
      }
      powerups.splice(pi, 1);
    }
  }

  // Particles & floats
  particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 60*dt; p.life -= dt*2; });
  particles = particles.filter(p => p.life > 0);
  floats.forEach(f => { f.y += f.vy*dt; f.life -= dt*1.1; });
  floats = floats.filter(f => f.life > 0);
}

// ---- LOOP ----
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  ctx.save();
  ctx.scale(scale, scale);
  update(dt);
  if      (state === 'menu')     drawMenu();
  else if (state === 'game')     drawGame();
  else if (state === 'gameover') drawGameOver();
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
